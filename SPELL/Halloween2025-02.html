<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-text: #e3e3e3;
            --notion-border: #2f2f2f;
            --sidebar-bg: #121212;
            --accent-blue: #6fb2ff;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
        }
        
        .description { color: #999999; }
        .dialogue { color: #ffffff; }

        .nav-item.disabled {
            color: #666 !important;
            text-decoration: line-through;
            pointer-events: none;
            opacity: 0.6;
        }

        /* --- 手機版頂部列 --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--notion-border);
            z-index: 1000;
            padding: 0 15px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--notion-text);
            font-size: 24px;
            cursor: pointer;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-title a {
            text-decoration: none;
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(227, 227, 227, 0.4);
            margin: 15px 0 5px 5px;
            font-weight: bold;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
        }

        .nav-item:hover { background-color: #2c2c2c; }

        /* --- 主要內容區 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 0;
        }

        .novel-text {
            font-family: 'Songti TC', serif;
            font-size: 1.3em;
            line-height: 1.8;
            color: #c4c4c4;
            letter-spacing: 0.03em;
            text-align: left;
            max-width: 680px;
            margin: 0 auto;
            white-space: pre-line;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        h2 { 
            font-size: 1.8em; 
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 15px;
            max-width: 680px; 
            margin: 0 auto 20px auto; 
            text-align: left; 
        }

        /* --- 打碼圖片效果 --- */
        .decoded-image-container {
            position: relative;
            max-width: 680px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .blurred-image {
            width: 100%;
            height: auto;
            display: block;
            filter: blur(25px); /* 預設模糊 */
            transition: filter 0.5s ease;
        }

        .decode-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* 當被點擊後切換的狀態 */
        .decoded-image-container.is-decoded .blurred-image {
            filter: blur(0);
        }
        .decoded-image-container.is-decoded .decode-overlay {
            opacity: 0;
        }

        /* --- Modal & Lightbox  --- */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { margin: 10% auto; width: 90%; max-width: 800px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .modal-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .modal-item img { width: 100%; height: 100%; object-fit: cover; }
        .close-btn { position: fixed; top: 15px; right: 25px; color: #fff; font-size: 35px; cursor: pointer; }
        .lightbox { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .lightbox-content { max-width: 90%; max-height: 90%; opacity: 0; transition: opacity 0.3s; }
        .lightbox.active .lightbox-content { opacity: 1; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: 0; top: 50px; bottom: 0; z-index: 999; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { padding: 70px 20px 20px 20px; }
        }
	/* --- 頁尾版權聲明 --- */
	.site-footer {
	    text-align: center;
	    color: #666;
	    font-size: 12px;
	    line-height: 1.8;
	    padding: 40px 0 20px 0;
	    border-top: 1px solid var(--notion-border);
	    margin-top: 40px;
	    font-family: sans-serif;
	}
	</style>
</head>
<body>

                警告，內含劇透成分，請閱讀完第一章後再繼續。

		<img src="../images/SideCG/萬聖節01.png" alt="劇情截圖01" class="blurred-image">

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝備選01.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝備選02.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝備選03.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝備選04.png" alt="CG"></div>

    </div>
</div>
<div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightbox-img" class="lightbox-content"></div>

<script>
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("active"); }
    function openModal() { document.getElementById("imageModal").style.display = "block"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    // 新增：點擊切換解碼函式
    function toggleDecode(element) {
        element.classList.toggle('is-decoded');
    }

    function openLightbox(element) {
        const imgSrc = element.querySelector('img').src;
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        lightbox.style.display = "flex";
        lightboxImg.onload = function() { lightbox.classList.add('active'); };
        lightboxImg.src = imgSrc;
    }

    function closeLightbox() {
        const lightbox = document.getElementById("lightbox");
        lightbox.classList.remove('active');
        setTimeout(() => { lightbox.style.display = "none"; }, 300);
    }

    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        if (event.target == modal) { closeModal(); }
    }
</script>
