            display: flex;

        .decoded-image-item {

        .blurred-image {
            width: 100%;

        .decode-overlay {
            position: absolute;
            top: 50%;
            left: 50%;

            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        .decoded-image-container.is-decoded .blurred-image {
            filter: blur(0);
        }

        .decoded-image-container.is-decoded .decode-overlay {
            opacity: 0;
        }

            max-width: 680px;
            margin: 0 auto 20px auto;

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .modal-content {
            margin: 10% auto;
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding-bottom: 40px;
        }

        .modal-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: #222;
        }

        .modal-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 25px;
            color: #fff;
            font-size: 35px;
            cursor: pointer;
            z-index: 20002;
        }

        .lightbox {
            display: none;
            position: fixed;
            z-index: 20000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 8px;
        }

        .lightbox.active .lightbox-content {
            opacity: 1;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 40px;
            padding: 20px;
            cursor: pointer;
            z-index: 20001;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .lightbox-nav:hover {
            opacity: 1;
            background-color: rgba(255,255,255,0.1);
        }

        .nav-prev { left: 10px; }
        .nav-next { right: 10px; }

        .page-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 680px;
            margin: 60px auto 0;
            padding-top: 20px;
            border-top: 1px solid var(--notion-border);

        .page-nav a {
            text-decoration: none;

        }

        .site-footer {

            padding: 40px 0 20px 0;

        @media (max-width: 768px) {

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item" onclick="openLightbox(0)"><img src="../images/SideCG/2025萬聖節變裝.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(1)"><img src="../images/SideCG/2025萬聖節變裝備選01.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(2)"><img src="../images/SideCG/2025萬聖節變裝備選02.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(3)"><img src="../images/SideCG/2025萬聖節變裝備選03.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(4)"><img src="../images/SideCG/2025萬聖節變裝備選04.png" alt="CG"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    <button class="lightbox-nav nav-prev" onclick="changeImage(-1); event.stopPropagation();">&#10094;</button>
    <img id="lightbox-img" class="lightbox-content" alt="大圖檢視" onclick="event.stopPropagation();">
    <button class="lightbox-nav nav-next" onclick="changeImage(1); event.stopPropagation();">&#10095;</button>
</div>

<script>
    let currentImgIndex = 0;
    const albumImages = document.querySelectorAll('.modal-item img');

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("active");
    }

    function openModal() {
        document.getElementById("imageModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    function toggleDecode(element) {
        element.classList.toggle('is-decoded');
    }

    function openLightbox(index) {
        currentImgIndex = index;
        const lightbox = document.getElementById("lightbox");
        lightbox.style.display = "flex";
        updateLightboxImage();
    }

    function updateLightboxImage() {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        lightbox.classList.remove('active');
        lightboxImg.src = albumImages[currentImgIndex].src;
        lightboxImg.onload = function () {
            lightbox.classList.add('active');
        };
    }

    function changeImage(step) {
        currentImgIndex += step;
        if (currentImgIndex >= albumImages.length) currentImgIndex = 0;
        if (currentImgIndex < 0) currentImgIndex = albumImages.length - 1;
        updateLightboxImage();
    }

    function closeLightbox() {
        const lightbox = document.getElementById("lightbox");
        lightbox.classList.remove('active');
        setTimeout(() => {
            lightbox.style.display = "none";
        }, 300);
    }

    document.addEventListener('keydown', function (e) {
        const lightbox = document.getElementById("lightbox");
        if (lightbox.style.display === "flex") {
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "Escape") closeLightbox();
        }
    });

    window.onclick = function (event) {
        const modal = document.getElementById("imageModal");
        const lightbox = document.getElementById("lightbox");
        if (event.target === modal) closeModal();
        if (event.target === lightbox) closeLightbox();
    };
</script>
