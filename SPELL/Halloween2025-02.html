<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-text: #e3e3e3;
            --notion-border: #2f2f2f;
            --sidebar-bg: #121212;
            --accent-blue: #6fb2ff;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
            /* 讓全站文字無法被選取，保護原創內容 */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        .description { color: #999999; }
        .dialogue { color: #ffffff; }

        .nav-item.disabled {
            color: #666 !important;
            text-decoration: line-through;
            pointer-events: none;
            opacity: 0.6;
        }

        /* --- 手機版頂部列 --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--notion-border);
            z-index: 1000;
            padding: 0 15px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--notion-text);
            font-size: 24px;
            cursor: pointer;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-title a {
            text-decoration: none;
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(227, 227, 227, 0.4);
            margin: 15px 0 5px 5px;
            font-weight: bold;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
        }

        .nav-item:hover { background-color: #2c2c2c; }

        /* --- 主要內容區 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 0;
        }

        .novel-text {
            font-family: 'Songti TC', serif;
            font-size: 1.3em;
            line-height: 1.8;
            color: #c4c4c4;
            letter-spacing: 0.03em;
            text-align: left;
            max-width: 680px;
            margin: 0 auto;
            white-space: pre-line;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        h2 { 
            font-size: 1.8em; 
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 15px;
            max-width: 680px; 
            margin: 0 auto 20px auto; 
            text-align: left; 
        }

        /* --- 打碼圖片效果 --- */
        .decoded-image-container {
            position: relative;
            max-width: 680px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .blurred-image {
            width: 100%;
            height: auto;
            display: block;
            filter: blur(25px);
            transition: filter 0.5s ease;
        }

        .decode-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .decoded-image-container.is-decoded .blurred-image {
            filter: blur(0);
        }
        .decoded-image-container.is-decoded .decode-overlay {
            opacity: 0;
        }

        /* --- Modal & Lightbox 升級 --- */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { margin: 10% auto; width: 90%; max-width: 800px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .modal-item { aspect-ratio: 1/1; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .modal-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 關閉按鈕，確保 z-index 最高 */
        .close-btn { position: fixed; top: 15px; right: 25px; color: #fff; font-size: 35px; cursor: pointer; z-index: 20002; }
        
        .lightbox { 
            display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; 
        }
        .lightbox-content { max-width: 90%; max-height: 90%; opacity: 0; transition: opacity 0.3s; }
        .lightbox.active .lightbox-content { opacity: 1; }

        /* 導航按鈕樣式 */
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: white; font-size: 40px;
            padding: 20px; cursor: pointer; z-index: 20001; opacity: 0.5; transition: opacity 0.2s;
        }
        .lightbox-nav:hover { opacity: 1; background-color: rgba(255,255,255,0.1); }
        .nav-prev { left: 10px; }
        .nav-next { right: 10px; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: 0; top: 50px; bottom: 0; z-index: 999; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { padding: 70px 20px 20px 20px; }
            .lightbox-nav { font-size: 30px; padding: 10px; }
        }

        .site-footer {
            text-align: center;
            color: #666;
            font-size: 12px;
            line-height: 1.8;
            padding: 40px 0 20px 0;
            border-top: 1px solid var(--notion-border);
            margin-top: 40px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div style="font-weight: bold; font-size: 14px;">🌻 旅程分享</div>
    <div style="width: 24px;"></div>
</header>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-title"><a href="../index.html">🌻卿卿我我-旅程分享</a></div>
    <div class="nav-group-label">ALBUM</div>
    <a href="javascript:void(0)" class="nav-item" onclick="openModal(); closeSidebar();">📷 章節CG</a>
    <div class="nav-group-label">EXTRAS</div>
    <a href="../CELEBRATION.html" class="nav-item">🎈 節慶區</a>
    <a href="../SPELL.html" class="nav-item">🔮 咒語區</a>
    <div class="nav-group-label">CELEBRATION</div>
    <a href="Halloween2025-02.html" class="nav-item">🎃 萬聖節-裝扮構想</a>
    <a href="story1.html" class="nav-item disabled">🗡️ BE預想：失憶囚籠</a>
    <a href="story2.html" class="nav-item disabled">💛 咒語：愛意實體化</a>
</nav>

<main class="main-content" onclick="closeSidebar()">
    <div class="content-container">
        <article>
            <h2>咒語：萬聖節-裝扮構想</h2>
            <div class="novel-text">
                警告，內含劇透成分。
                請閱讀完 第一章-第▩▩▩篇 後再繼續。
                <div class="decoded-image-container" onclick="toggleDecode(this)">
                    <img src="../images/SideCG/萬聖節01.png" alt="劇情截圖01" class="blurred-image">
                    <img src="../images/SideCG/萬聖節02.png" alt="劇情截圖02" class="blurred-image">
                    <img src="../images/SideCG/萬聖節03.png" alt="劇情截圖03" class="blurred-image">
                    <div class="decode-overlay">防雷模糊</div>
                </div>
            </div>
        </article>
        <footer class="site-footer">
            © 2026 [Yko]. All Rights Reserved.<br>
            本站文字內容受著作權保護，部分敘事由 AI 協作輔助生成。插圖、CG 係由 AI 協作生成，若為非 AI 作品將另行特別備註。
        </footer>
    </div>
</main>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item" onclick="openLightbox(0)"><img src="../images/SideCG/2025萬聖節變裝.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(1)"><img src="../images/SideCG/2025萬聖節變裝備選01.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(2)"><img src="../images/SideCG/2025萬聖節變裝備選02.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(3)"><img src="../images/SideCG/2025萬聖節變裝備選03.png" alt="CG"></div>
        <div class="modal-item" onclick="openLightbox(4)"><img src="../images/SideCG/2025萬聖節變裝備選04.png" alt="CG"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    <button class="lightbox-nav nav-prev" onclick="changeImage(-1); event.stopPropagation();">&#10094;</button>
    <img id="lightbox-img" class="lightbox-content" onclick="event.stopPropagation();">
    <button class="lightbox-nav nav-next" onclick="changeImage(1); event.stopPropagation();">&#10095;</button>
</div>

<script>
    let currentImgIndex = 0;
    // 獲取相簿中所有的圖片
    const albumImages = document.querySelectorAll('.modal-item img');

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("active"); }
    function openModal() { document.getElementById("imageModal").style.display = "block"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    function toggleDecode(element) {
        element.classList.toggle('is-decoded');
    }

    // 開啟大圖模式
    function openLightbox(index) {
        currentImgIndex = index;
        const lightbox = document.getElementById("lightbox");
        lightbox.style.display = "flex";
        updateLightboxImage();
    }

    // 更新目前顯示的大圖
    function updateLightboxImage() {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        
        // 先移除 active 類別以產生淡入效果
        lightbox.classList.remove('active');
        
        lightboxImg.src = albumImages[currentImgIndex].src;
        lightboxImg.onload = function() {
            lightbox.classList.add('active');
        };
    }

    // 切換上一張/下一張
    function changeImage(step) {
        currentImgIndex += step;
        // 循環邏輯
        if (currentImgIndex >= albumImages.length) currentImgIndex = 0;
        if (currentImgIndex < 0) currentImgIndex = albumImages.length - 1;
        updateLightboxImage();
    }

    function closeLightbox() {
        const lightbox = document.getElementById("lightbox");
        lightbox.classList.remove('active');
        setTimeout(() => {
            lightbox.style.display = "none";
        }, 300);
    }

    // 鍵盤支援
    document.addEventListener('keydown', function(e) {
        const lightbox = document.getElementById("lightbox");
        if (lightbox.style.display === "flex") {
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "Escape") closeLightbox();
        }
    });

    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        let lightbox = document.getElementById("lightbox");
        if (event.target == modal) { closeModal(); }
        if (event.target == lightbox) { closeLightbox(); }
    }
</script>

</body>
</html>
