<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-border: #edeef0;
            --sidebar-bg: #fbfbfa;
            --tag-cp-bg: #e8deee;
            --tag-cp-text: #6940a5;
            --card-bg: #f7f7f5;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側側邊欄 */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 25px;
            padding-left: 10px;
            cursor: pointer;
        }

        .sidebar-title a { text-decoration: none; color: var(--notion-text); }

        .nav-group-label {
            font-size: 12px;
            color: rgba(55, 53, 47, 0.5);
            margin: 15px 0 5px 10px;
            text-transform: uppercase;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
            transition: background 0.2s;
        }

        .nav-item:hover { background-color: #efefee; }

        /* 右側主要內容區 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 人物介紹卡片設計 */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #ddd;
        }

        .char-info h3 { margin: 0 0 5px 0; font-size: 1.1em; }
        .char-info p { margin: 0; font-size: 0.9em; color: #666; line-height: 1.4; }

        /* 章節區域 */
        .chapter-section {
            padding-top: 60px;
            margin-bottom: 100px;
            min-height: 90vh;
        }

        .novel-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15em;
            line-height: 1.9;
            white-space: pre-line;
            color: #222;
        }

        h1 { font-size: 2.5em; margin-bottom: 10px; }
        h2 { border-bottom: 1px solid var(--notion-border); padding-bottom: 10px; margin-top: 0; }
