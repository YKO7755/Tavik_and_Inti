<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-border: #edeef0;
            --sidebar-bg: #fbfbfa;
            --tag-cp-bg: #e8deee;
            --tag-cp-text: #6940a5;
            --card-bg: #f7f7f5;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側側邊欄 */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 25px;
            padding-left: 10px;
            cursor: pointer;
        }

        .sidebar-title a { text-decoration: none; color: var(--notion-text); }

        .nav-group-label {
            font-size: 12px;
            color: rgba(55, 53, 47, 0.5);
            margin: 15px 0 5px 10px;
            text-transform: uppercase;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
            transition: background 0.2s;
        }

        .nav-item:hover { background-color: #efefee; }

        /* 右側主要內容區 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 人物介紹卡片設計 */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #ddd;
        }

        .char-info h3 { margin: 0 0 5px 0; font-size: 1.1em; }
        .char-info p { margin: 0; font-size: 0.9em; color: #666; line-height: 1.4; }

        /* 章節區域 */
        .chapter-section {
            padding-top: 60px;
            margin-bottom: 100px;
            min-height: 90vh;
        }

        .novel-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15em;
            line-height: 1.9;
            white-space: pre-line;
            color: #222;
        }

        h1 { font-size: 2.5em; margin-bottom: 10px; }
        h2 { border-bottom: 1px solid var(--notion-border); padding-bottom: 10px; margin-top: 0; }

        .header-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--notion-border); }
            .main-content { height: auto; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-title"><a href="#home">🍰 卿卿我我</a></div>
    
    <div class="nav-group-label">關於</div>
    <a href="#home" class="nav-item">👥 人物介紹</a>
    
    <div class="nav-group-label">章節列表</div>
    <a href="#ch1" class="nav-item">📄 測試－第一章</a>
    <a href="#ch2" class="nav-item">📄 測試－第二章</a>
    <a href="#ch3" class="nav-item">📄 測試－第三章</a>
</nav>

<main class="main-content">
    <div class="content-container">
        
        <section id="home" class="chapter-section">
            <img src="https://images.unsplash.com/photo-1464802686167-b939a67e06a1?auto=format&fit=crop&w=1200&q=80" class="header-img">
            <h1>人物介紹</h1>
            <p>在這裡介紹你的故事舞台與主要角色。</p>

            <div class="intro-grid">
                <div class="char-card">
                    <img src="images/印提(微笑).png" class="char-avatar" alt="印提">
                    <div class="char-info">
                        <h3>印提</h3>
                        <p>角色描述：例如性格、能力、或是與塔維克的關係。這裡可以寫得很詳細。</p>
                    </div>
                </div>

                <div class="char-card">
                    <img src="https://via.placeholder.com/80" class="char-avatar" alt="塔維克">
                    <div class="char-info">
                        <h3>塔維克</h3>
                        <p>角色描述：另一位主角的設定資訊。這是一個示範卡片。</p>
                    </div>
                </div>
            </div>
        </section>

        <hr>

        <article class="chapter-section" id="ch1">
            <h2>1. Up all night</h2>
            <div class="novel-text">
                你醒來時，發現自己正倒臥在廢土上。
                黏稠、帶有金屬味的泥土黏著你的臉頰...
                
                <img src="images/印提(微笑).png" style="width:100%; border-radius:8px; margin: 20px 0;">
                
                這裡放你的第一章內容。
            </div>
        </article>

        </div>
</main>

</body>
</html>
