<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-border: #edeef0;
            --sidebar-bg: #fbfbfa;
            --card-bg: #f7f7f5;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-title a {
            text-decoration: none;
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(55, 53, 47, 0.5);
            margin: 15px 0 5px 5px;
            font-weight: bold;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
        }

        .nav-item:hover { background-color: #efefee; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px; /* 增加一點寬度，讓大圖卡片排起來更好看 */
            margin: 0 auto;
        }

        /* --- 人物介紹（大圖卡片版） --- */
        .intro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* 自動適應卡片寬度 */
            gap: 25px;
            margin-top: 30px;
        }

        .char-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden; /* 確保圓角裁切到圖片 */
            display: flex;
            flex-direction: column; /* 上下排列 */
            gap: 20px;
            text-align: center; /* 文字置中 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* 加點陰影增加質感 */
        }

        .char-card:hover {
            transform: translateY(-5px); /* 懸停時浮起效果 */
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .char-avatar {
            width: 100%; /* 填滿卡片寬度 */
            height: 350px; /* 【關鍵】設定一個較高的高度，形成大正方形感覺 */
            object-fit: cover; /* 自動裁切不變形 */
            background: #eee;
        }

        .char-info {
            padding: 0 25px 25px 25px; /* 圖片下方留白，文字用 padding */
        }

        .char-info h3 { margin: 0 0 10px 0; font-size: 1.3em; }
        .char-info p { margin: 0; font-size: 0.95em; line-height: 1.6; color: #666; }

        /* --- 人物相簿區塊 --- */
        .album-section {
            margin-top: 60px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .album-item {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            background: #eee;
            border: 1px solid var(--notion-border);
            transition: transform 0.2s;
        }

        .album-item:hover { transform: scale(1.02); }
        .album-item img { width: 100%; height: 100%; object-fit: cover; }

        .chapter-section {
            padding-top: 60px;
            margin-bottom: 80px;
            min-height: 100vh;
        }

        .novel-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15em;
            line-height: 1.9;
            white-space: pre-line;
        }

        .header-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        h2 { border-bottom: 1px solid var(--notion-border); padding-bottom: 15px; margin-top: 40px; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-title"><a href="#home">🍰 卿卿我我</a></div>
    
    <div class="nav-group-label">ABOUT</div>
    <a href="#home" class="nav-item">👥 人物介紹</a>
    
    <div class="nav-group-label">CHAPTERS</div>
    <a href="#ch1" class="nav-item">📄 測試－第一章</a>
    <a href="#ch2" class="nav-item">📄 測試－第二章</a>
    <a href="#ch3" class="nav-item">📄 測試－第三章</a>
</nav>

<main class="main-content">
    <div class="content-container">
        
        <section id="home" class="chapter-section">
            <img src="https://images.unsplash.com/photo-1464802686167-b939a67e06a1?auto=format&fit=crop&w=1200&q=80" class="header-img">
            <h1>人物介紹</h1>
            
            <div class="intro-grid">
                <div class="char-card">
                    <img src="images/印提(微笑).png" class="char-avatar" alt="印提">
                    <div class="char-info">

                    </div>
                </div>
                <div class="char-card">
                    <div class="char-avatar" style="background:#ddd; display:flex; align-items:center; justify-content:center; font-size: 60px; color: white;">?</div>
                    <div class="char-info">

                    </div>
                </div>
            </div>

            <div class="album-section">
                <h2>🖼️ 人物相簿</h2>
                <div class="album-grid">
                    <div class="album-item"><img src="images/印提(微笑).png"></div>
                    <div class="album-item"><div style="height:100%; display:flex; align-items:center; justify-content:center; color:#aaa; font-size: 0.9em;">待增加插圖</div></div>
                    <div class="album-item"><div style="height:100%; display:flex; align-items:center; justify-content:center; color:#aaa; font-size: 0.9em;">待增加插圖</div></div>
                </div>
            </div>
        </section>

        <hr>

        <article id="ch1" class="chapter-section">
            <h2>1. 第一章標題</h2>
            <div class="novel-text">這裡是第一章的內容。</div>
        </article>

        <article id="ch2" class="chapter-section">
            <h2>2. 這是第二章的標題</h2>
            <div class="novel-text">這裡寫下第二章的故事內容...</div>
        </article>

        <article id="ch3" class="chapter-section">
            <h2>3. 這是第三章的標題</h2>
            <div class="novel-text">這裡寫下第三章的故事內容...</div>
        </article>

    </div>
</main>

</body>
</html>
