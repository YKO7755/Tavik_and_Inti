<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卿卿我我 | 旅程分享</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --notion-bg: #191919;
      --notion-text: #e3e3e3;
      --notion-border: #2f2f2f;
      --sidebar-bg: #121212;
      --accent-blue: #6fb2ff;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: var(--notion-bg);
      color: var(--notion-text);
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* 手機頂列 */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--notion-border);
      z-index: 1000;
      padding: 0 15px;
      align-items: center;
      justify-content: space-between;
    }
    .menu-toggle {
      background: none;
      border: none;
      color: var(--notion-text);
      font-size: 24px;
      cursor: pointer;
    }

    /* 側邊欄 */
    .sidebar {
      width: 270px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--notion-border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .sidebar-title a {
      text-decoration: none;
      color: var(--notion-text);
      font-size: 1.2em;
      font-weight: bold;
      display: block;
      margin-bottom: 20px;
    }
    .nav-group-label {
      font-size: 11px;
      color: rgba(227,227,227,0.4);
      margin: 15px 0 5px 5px;
      font-weight: bold;
    }
    .nav-item {
      text-decoration: none;
      color: var(--notion-text);
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 2px;
      font-size: 14px;
      display: block;
      cursor: pointer;
    }
    .nav-item:hover { background-color: #2c2c2c; }
    .nav-item.active { background-color: #2c2c2c; color: #fff; }
    .nav-item.disabled {
      color: #666 !important;
      text-decoration: line-through;
      pointer-events: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .nav-toggle-group summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--notion-text);
    }
    .nav-toggle-content {
      padding-left: 15px;
      border-left: 1px solid var(--notion-border);
      margin-left: 10px;
    }

    /* 主內容區 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 40px;
      scroll-behavior: smooth;
    }
    .content-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 0;
    }

    .novel-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.3em;
      line-height: 1.8;
      color: #c4c4c4;
      letter-spacing: 0.03em;
      max-width: 680px;
      margin: 0 auto;
      white-space: pre-line;
      word-wrap: break-word;
  }
    /* 自動亮色的對話樣式 */
    .dialogue { color: #ffffff; font-weight: 500; }


    h2 {
      font-size: 1.8em;
      border-bottom: 1px solid var(--notion-border);
      padding-bottom: 15px;
      max-width: 680px;
      margin: 0 auto 20px auto;
    }

    /* 導覽按鈕 */
    .chapter-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 680px;
      margin: 60px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--notion-border);
    }
    .chapter-nav a {
      text-decoration: none;
      color: var(--accent-blue);
      font-size: 14px;
      cursor: pointer;
    }
    .chapter-nav a.disabled { color: #666; pointer-events: none; opacity: 0.4; }

    /* CG 按鈕 */
    .cg-btn-wrap { max-width: 680px; margin: 0 auto 20px auto; text-align: right; }
    .cg-btn {
      background: none; border: 1px solid var(--notion-border);
      color: var(--notion-text); padding: 5px 12px;
      border-radius: 4px; font-size: 13px; cursor: pointer;
    }

    /* Modal (相簿牆) */
    .modal {
      display: none; position: fixed; z-index: 9999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9); overflow-y: auto;
    }
    .modal-content {
      margin: 5% auto; width: 90%; max-width: 900px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .modal-item {
      max-width: 100%; border-radius: 8px; cursor: pointer; transition: transform 0.3s;
    }
    .modal-item:hover { transform: scale(1.02); }
    .modal-item img { width: auto; max-height: 70vh; display: block; border-radius: 8px; }

    /* Lightbox (大圖模式) */
    .lightbox {
      display: none; position: fixed; z-index: 20000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center;
    }
    .lightbox-content {
      max-width: 90%; max-height: 90%; border-radius: 8px;
      opacity: 0; transition: opacity 0.3s;
    }
    .lightbox.active .lightbox-content { opacity: 1; }

    /* 燈箱導航箭頭 */
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.05); border: none; color: white;
      font-size: 40px; padding: 20px; cursor: pointer; z-index: 20001;
      border-radius: 5px; transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.15); }
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }

    .close-btn {
      position: fixed; top: 15px; right: 25px;
      color: #fff; font-size: 35px; cursor: pointer; z-index: 20002;
    }

    .site-footer {
      text-align: center; color: #666; font-size: 12px;
      padding: 40px 0 20px 0; border-top: 1px solid var(--notion-border);
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .sidebar { position: fixed; left: 0; top: 50px; bottom: 0; z-index: 999; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { padding: 70px 20px 20px 20px; }
      .lb-nav { font-size: 30px; padding: 10px; }
    }
  </style>
</head>
<body>

<header class="mobile-header">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  <div style="font-weight:bold;font-size:14px;">🌻 旅程分享</div>
  <div style="width:24px;"></div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-title"><a href="index.html">🌻卿卿我我-旅程分享</a></div>
  <div id="sidebar-nav"></div>
  <div class="nav-group-label">EXTRAS</div>
  <a href="CELEBRATION.html" class="nav-item">🎈 節慶區</a>
  <a href="SPELL.html" class="nav-item">🔮 咒語區</a>
</nav>

<main class="main-content" id="main" onclick="closeSidebar()">
  <div class="content-container">
    <article id="chapter-content"></article>
    <footer class="site-footer">
      © 2026 [Yko]. All Rights Reserved.<br>
      本站文字內容受著作權保護，部分敘事由 AI 協作輔助生成。插圖、CG 係由 AI 協作生成，若為非 AI 作品將另行特別備註。
    </footer>
  </div>
</main>

<div id="imageModal" class="modal">
  <span class="close-btn" onclick="closeModal()">&times;</span>
  <div class="modal-content" id="modal-inner"></div>
</div>

<div id="lightbox" class="lightbox">
  <span class="close-btn" onclick="closeLightbox()">&times;</span>
  <button class="lb-nav lb-prev" onclick="changeImage(-1); event.stopPropagation();">&#10094;</button>
  <img id="lightbox-img" class="lightbox-content" src="" alt="大圖">
  <button class="lb-nav lb-next" onclick="changeImage(1); event.stopPropagation();">&#10095;</button>
</div>

<script src="chapters.js"></script>
<script>
  let currentCGs = []; // 儲存當前章節的 CG 列表
  let currentImgIndex = 0;

  function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
  function closeSidebar()  { document.getElementById("sidebar").classList.remove("active"); }
  function openModal()     { document.getElementById("imageModal").style.display = "block"; }
  function closeModal()    { document.getElementById("imageModal").style.display = "none"; }

  // 開啟大圖模式並記錄索引
  function openLightbox(index) {
    currentImgIndex = index;
    const lb = document.getElementById("lightbox");
    lb.style.display = "flex";
    updateLightboxImage();
  }

  function updateLightboxImage() {
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lightbox-img");
    lb.classList.remove('active');
    lbImg.src = currentCGs[currentImgIndex].src;
    lbImg.onload = () => lb.classList.add('active');
  }

  function changeImage(step) {
    currentImgIndex += step;
    if (currentImgIndex >= currentCGs.length) currentImgIndex = 0;
    if (currentImgIndex < 0) currentImgIndex = currentCGs.length - 1;
    updateLightboxImage();
  }

  function closeLightbox() {
    const lb = document.getElementById("lightbox");
    lb.classList.remove('active');
    setTimeout(() => { lb.style.display = "none"; }, 300);
  }

  // 鍵盤支援
  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById("lightbox");
    if (lb.style.display === "flex") {
      if (e.key === "ArrowLeft") changeImage(-1);
      if (e.key === "ArrowRight") changeImage(1);
      if (e.key === "Escape") closeLightbox();
    }
  });

  // 生成側邊欄導航
  function buildSidebar(currentId) {
    const nav = document.getElementById("sidebar-nav");
    nav.innerHTML = "";
    let lastGroup = null;
    let groupContent = null;

    CHAPTERS.forEach(ch => {
      if (ch.group && ch.group !== lastGroup) {
        lastGroup = ch.group;
        const details = document.createElement("details");
        details.className = "nav-toggle-group";
        details.open = true;
        const summary = document.createElement("summary");
        summary.className = "nav-item";
        summary.textContent = "📚 " + ch.group;
        details.appendChild(summary);
        groupContent = document.createElement("div");
        groupContent.className = "nav-toggle-content";
        details.appendChild(groupContent);
        nav.appendChild(details);
      }
      const a = document.createElement("a");
      a.className = "nav-item" + (ch.available ? "" : " disabled") + (ch.id === currentId ? " active" : "");
      a.textContent = ch.nav;
      if (ch.available) a.href = "reader.html?ch=" + ch.id;
      (groupContent || nav).appendChild(a);
    });
  }

  // 載入章節
    async function loadChapter(id) {
    const ch = CHAPTERS.find(c => c.id === id) || CHAPTERS.find(c => c.available);
    document.title = ch.title + " | 卿卿我我";
    history.replaceState(null, "", "reader.html?ch=" + ch.id);
    buildSidebar(ch.id);
    document.getElementById("main").scrollTo(0, 0);

    // 更新當前 CG 數據
    currentCGs = ch.cg || [];
    const modalInner = document.getElementById("modal-inner");
    modalInner.innerHTML = currentCGs.map((img, idx) => 
      `<div class="modal-item" onclick="openLightbox(${idx})"><img src="${img.src}" alt="${img.alt}"></div>`
    ).join("") + `<p style="color:#888; font-size:12px;">🌻點擊圖片看大圖 | 支援鍵盤左右鍵</p>`;

    const prevCh = ch.prev ? CHAPTERS.find(c => c.id === ch.prev) : null;
    const nextCh = ch.next ? CHAPTERS.find(c => c.id === ch.next) : null;

    const cgBtnHtml = (currentCGs.length > 0) ? `<div class="cg-btn-wrap"><button class="cg-btn" onclick="openModal()">📷 章節 CG</button></div>` : "";

async function loadChapter(id) {
  const ch = CHAPTERS.find(c => c.id === id);

  try {
    const response = await fetch(ch.filePath);
    const rawText = await response.text();

    const formattedText = rawText
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/「([^」]+)」/g,'<span class="dialogue">「$1」</span>');

    document.getElementById("chapter-content").innerHTML = `
      <h2>${ch.title}</h2>
      <div class="novel-text">${formattedText}</div>
    `;

  } catch(err) {
    document.getElementById("chapter-content").innerHTML =
      "章節載入失敗";
  }

  // 初始化
  (function init() {
    const params = new URLSearchParams(location.search);
    loadChapter(params.get("ch") || CHAPTERS.find(c => c.available).id);
  })();

  // 點擊背景關閉
  window.onclick = function(e) {
    if (e.target === document.getElementById("imageModal")) closeModal();
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  };
</script>
</body>
</html>
