<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卿卿我我 | 旅程分享</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --notion-bg: #191919;
      --notion-text: #e3e3e3;
      --notion-border: #2f2f2f;
      --sidebar-bg: #121212;
      --accent-blue: #6fb2ff;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: var(--notion-bg);
      color: var(--notion-text);
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .mobile-header {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--notion-border);
      z-index: 1000;
      padding: 0 15px;
      align-items: center;
      justify-content: space-between;
    }

    .menu-toggle {
      background: none;
      border: none;
      color: var(--notion-text);
      font-size: 24px;
      cursor: pointer;
    }

    .sidebar {
      width: 270px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--notion-border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .sidebar-title a {
      text-decoration: none;
      color: var(--notion-text);
      font-size: 1.2em;
      font-weight: bold;
      display: block;
      margin-bottom: 20px;
    }

    .nav-group-label {
      font-size: 11px;
      color: rgba(227,227,227,0.4);
      margin: 15px 0 5px 5px;
      font-weight: bold;
    }

    .nav-item {
      text-decoration: none;
      color: var(--notion-text);
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 2px;
      font-size: 14px;
      display: block;
      cursor: pointer;
    }

    .nav-item:hover { background-color: #2c2c2c; }
    .nav-item.active { background-color: #2c2c2c; color: #fff; }

    .nav-item.disabled {
      color: #666 !important;
      text-decoration: line-through;
      pointer-events: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .nav-toggle-group summary::-webkit-details-marker { display: none; }

    .nav-toggle-group summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--notion-text);
      opacity: 1;
    }

    .nav-toggle-group[open] summary {
      color: rgba(227,227,227,0.5);
    }

    .nav-toggle-group summary:hover {
      background-color: #2c2c2c;
    }

    .nav-toggle-content {
      padding-left: 15px;
      border-left: 1px solid var(--notion-border);
      margin-left: 10px;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 40px;
      scroll-behavior: smooth;
    }

    .content-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 0;
    }

    .novel-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.3em;
      line-height: 1.8;
      color: #c4c4c4;
      letter-spacing: 0.03em;
      max-width: 680px;
      margin: 0 auto;
      white-space: pre-line;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .description { color: #999999; }
    .dialogue { color: #ffffff; }

.novel-text a {
  color: var(--accent-blue);
  text-decoration: none;
}

.novel-text a:hover {
  text-decoration: underline;
}

    h2 {
      font-size: 1.8em;
      border-bottom: 1px solid var(--notion-border);
      padding-bottom: 15px;
      max-width: 680px;
      margin: 0 auto 20px auto;
      text-align: left;
    }

    .chapter-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 680px;
      margin: 60px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--notion-border);
      gap: 12px;
    }

    .chapter-nav a {
      text-decoration: none;
      color: var(--accent-blue);
      font-size: 14px;
      transition: opacity 0.2s;
      cursor: pointer;
    }

    .chapter-nav a:hover { opacity: 0.7; }

    .chapter-nav a.disabled {
      color: #666;
      pointer-events: none;
      opacity: 0.4;
    }

    .nav-home {
      color: var(--notion-text) !important;
      font-weight: bold;
    }

    .cg-btn-wrap {
      max-width: 680px;
      margin: 0 auto 20px auto;
      text-align: right;
    }

    .cg-btn {
      background: none;
      border: 1px solid var(--notion-border);
      color: var(--notion-text);
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cg-btn:hover { background: #2c2c2c; }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9);
      overflow-y: auto;
      padding-bottom: 50px;
    }

    .modal-content {
      margin: 5% auto;
      width: 90%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .modal-item {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .modal-item:hover { transform: scale(1.03); }

    .modal-item img {
      width: auto;
      max-height: 70vh;
      display: block;
      border-radius: 8px;
      object-fit: contain;
    }

    .modal-footer-text {
      width: 100%;
      color: #888;
      text-align: center;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .close-btn {
      position: fixed;
      top: 15px; right: 25px;
      color: #fff;
      font-size: 35px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 20000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .lightbox.active .lightbox-content { opacity: 1; }

    .site-footer {
      text-align: center;
      color: #666;
      font-size: 12px;
      line-height: 1.8;
      padding: 40px 0 20px 0;
      border-top: 1px solid var(--notion-border);
      margin-top: 40px;
      font-family: sans-serif;
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .mobile-header { display: flex; }
      .sidebar {
        position: fixed;
        left: 0; top: 50px; bottom: 0;
        z-index: 999;
        transform: translateX(-100%);
      }
      .sidebar.active { transform: translateX(0); }
      .main-content { padding: 70px 20px 20px 20px; }
    }
  </style>
</head>
<body>

<header class="mobile-header">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  <div style="font-weight:bold;font-size:14px;">🌻 旅程分享</div>
  <div style="width:24px;"></div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-title">
    <a href="index.html">🌻卿卿我我-旅程分享</a>
  </div>
  <div id="sidebar-nav"></div>
  <div class="nav-group-label">EXTRAS</div>
  <a href="CELEBRATION.html" class="nav-item">🎈 節慶區</a>
  <a href="SPELL.html" class="nav-item">🔮 咒語區</a>
</nav>

<main class="main-content" id="main" onclick="closeSidebar()">
  <div class="content-container">
    <article id="chapter-content"></article>
    <footer class="site-footer">
      © 2026 [Yko]. All Rights Reserved.<br>
      本站文字內容受著作權保護，部分敘事由 AI 協作輔助生成。插圖、CG 係由 AI 協作生成，若為非 AI 作品將另行特別備註。
    </footer>
  </div>
</main>

<div id="imageModal" class="modal">
  <span class="close-btn" onclick="closeModal()">&times;</span>
  <div class="modal-content" id="modal-inner"></div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" class="lightbox-content" src="" alt="大圖檢視">
</div>

<script src="chapters.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
  }

  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("active");
  }

  function openModal() {
    document.getElementById("imageModal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("imageModal").style.display = "none";
  }

  function openLightbox(element) {
    const imgSrc = element.querySelector("img").src;
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lightbox-img");
    lb.style.display = "flex";
    lbImg.onload = () => lb.classList.add("active");
    lbImg.src = imgSrc;
  }

  function closeLightbox() {
    const lb = document.getElementById("lightbox");
    lb.classList.remove("active");
    setTimeout(() => {
      lb.style.display = "none";
      document.getElementById("lightbox-img").src = "";
    }, 300);
  }

  window.onclick = function (e) {
    if (e.target === document.getElementById("imageModal")) closeModal();
    if (e.target === document.getElementById("lightbox")) closeLightbox();
  };

  function buildSidebar(currentId) {
    const nav = document.getElementById("sidebar-nav");
    nav.innerHTML = "";

    let lastGroup = null;
    let groupContent = null;

    CHAPTERS.forEach(ch => {
 	if (ch.secret) return; 
      if (ch.group && ch.group !== lastGroup) {
        lastGroup = ch.group;

        const groupEl = document.createElement("details");
        groupEl.className = "nav-toggle-group";
        groupEl.open = true;

        const summary = document.createElement("summary");
        summary.className = "nav-item";
        summary.textContent = "📚 " + ch.group;
        groupEl.appendChild(summary);

        groupContent = document.createElement("div");
        groupContent.className = "nav-toggle-content";
        groupEl.appendChild(groupContent);

        nav.appendChild(groupEl);
      }

      const a = document.createElement("a");
      a.className = "nav-item" + (ch.available ? "" : " disabled") + (ch.id === currentId ? " active" : "");
      a.textContent = ch.nav;

      if (ch.available) {
        a.href = "reader.html?ch=" + ch.id;
      } else {
        a.href = "javascript:void(0)";
      }

      (groupContent || nav).appendChild(a);
    });
  }

  async function loadChapter(id) {
    const ch = CHAPTERS.find(c => c.id === id);

    if (!ch || !ch.available) {
      const firstAvailable = CHAPTERS.find(c => c.available);
      if (firstAvailable) {
        loadChapter(firstAvailable.id);
      }
      return;
    }

    document.title = ch.title + " | 卿卿我我";
    history.replaceState(null, "", "reader.html?ch=" + id);
    buildSidebar(id);
    document.getElementById("main").scrollTo(0, 0);

    const modalInner = document.getElementById("modal-inner");
    if (ch.cg && ch.cg.length > 0) {
      modalInner.innerHTML = ch.cg.map(img =>
        `<div class="modal-item" onclick="openLightbox(this)"><img src="${img.src}" alt="${img.alt}" loading="lazy"></div>`
      ).join("") + `<p class="modal-footer-text">🌻點擊圖片檢視大圖 | 點擊背景關閉圖片</p>`;
    } else {
      modalInner.innerHTML = `<p class="modal-footer-text">本章尚無 CG。</p>`;
    }

    const prevCh = ch.prev ? CHAPTERS.find(c => c.id === ch.prev) : null;
    const nextCh = ch.next ? CHAPTERS.find(c => c.id === ch.next) : null;

    const prevHtml = prevCh && prevCh.available
      ? `<a href="reader.html?ch=${prevCh.id}">← 上一篇</a>`
      : `<a class="disabled">☀️</a>`;

    const nextHtml = nextCh && nextCh.available
      ? `<a href="reader.html?ch=${nextCh.id}">下一篇 →</a>`
      : `<a class="disabled">${nextCh ? nextCh.nav.replace(/📘 |📖 /g, "") + "（未開放）" : ""}</a>`;

    const cgBtnHtml = (ch.cg && ch.cg.length > 0)
      ? `<div class="cg-btn-wrap"><button class="cg-btn" onclick="openModal()">📷 章節 CG</button></div>`
      : "";

    try {
      const response = await fetch(ch.filePath);
      if (!response.ok) throw new Error("讀取失敗");

      const rawText = await response.text();

	const formattedText = rawText
	  .replace(/&/g, "&amp;")
	  .replace(/</g, "&lt;")
	  .replace(/>/g, "&gt;")
	  .replace(/「([^」]+)」/g, '<span class="dialogue">「$1」</span>')
	  .replace(
	    /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
	    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
	  );

      document.getElementById("chapter-content").innerHTML = `
        <h2>${ch.title}</h2>
        ${cgBtnHtml}
        <div class="novel-text">${formattedText}</div>
        <div class="chapter-nav">
          ${prevHtml}
          <a href="index.html" class="nav-home">回目錄</a>
          ${nextHtml}
        </div>
      `;
    } catch (error) {
      document.getElementById("chapter-content").innerHTML = `
        <h2>${ch.title}</h2>
        <div class="novel-text">章節載入失敗。</div>
        <div class="chapter-nav">
          ${prevHtml}
          <a href="index.html" class="nav-home">回目錄</a>
          ${nextHtml}
        </div>
      `;
    }
  }

  (function init() {
    const params = new URLSearchParams(location.search);
    const firstAvailable = CHAPTERS.find(c => c.available);
    const id = params.get("ch") || (firstAvailable ? firstAvailable.id : null);

    if (id) {
      loadChapter(id);
    } else {
      document.getElementById("chapter-content").innerHTML = `
        <h2>目前沒有可用章節</h2>
        <div class="novel-text">請先確認 chapters.js 是否有設定 available: true 的章節。</div>
      `;
    }
  })();
</script>

</body>
</html>
