<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-text: #e3e3e3;
            --notion-border: #2f2f2f;
            --sidebar-bg: #121212;
            --card-bg: #222222;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-title a {
            text-decoration: none; 
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(227, 227, 227, 0.4);
            margin: 15px 0 5px 5px;
            font-weight: bold;
        }

        .nav-item {
            text-decoration: none; 
            color: var(--notion-text);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
            cursor: pointer;
        }

        .nav-item:hover { background-color: #2c2c2c; }

        /* --- 主要內容區 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .novel-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2em;
            line-height: 2;
            white-space: pre-line;
            color: var(--notion-text);
        }

        h2 { 
            font-size: 1.8em; 
            margin-top: 40px; 
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 15px;
        }

        /* --- 浮動視窗 (Modal) - IG 網格風格 --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .modal-content {
            margin: 10% auto;
            width: 90%;
            max-width: 800px; /* 三欄寬度適中 */
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 強制三欄 */
            gap: 8px; /* 圖片間距 */
        }

        .modal-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #222;
            border-radius: 4px;
        }

        .modal-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 裁切成正方形 */
            transition: opacity 0.2s;
        }

        .modal-item img:hover { opacity: 0.8; }

        .modal-footer-text {
            grid-column: span 3; /* 橫跨三欄 */
            color: #ccc;
            text-align: center;
            font-size: 13px;
            margin-top: 20px;
            font-family: sans-serif;
        }

        .close-btn {
            position: fixed; /* 固定在右上角 */
            top: 15px;
            right: 25px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        @media (max-width: 600px) {
            .modal-content { 
                grid-template-columns: repeat(2, 1fr); /* 手機板兩欄 */
                margin: 20% auto;
            }
            .modal-footer-text { grid-column: span 2; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-title">
        <a href="index.html">🌻卿卿我我-旅程分享</a>
    </div>

    <div class="nav-group-label">CHAPTERS</div>
    <a href="chapter1.html" class="nav-item">📄 第一章：倒臥廢土</a>
    <a href="chapter2.html" class="nav-item">📄 測試－第二章</a>
    <a href="chapter3.html" class="nav-item">📄 測試－第三章</a>

    <div class="nav-group-label">ALBUM</div>
    <a href="javascript:void(0)" class="nav-item" onclick="openModal()">📷章節CG</a>
</nav>

<main class="main-content">
    <div class="content-container">
        <article id="ch1" class="chapter-section">
            <h2>1. 第一章：倒臥廢土</h2>
            <div class="novel-text">你醒來時，發現自己正倒臥在廢土上。
黏稠、帶有金屬味的泥土黏著你的臉頰。天色混濁，隱約能見奇特的飛行物……那群東西像是樹枝與鳥骨拼接而成的，甩著透明膜狀的翅，飛過你頭頂時還發出啪搭啪搭的聲音。</div>
        </article>
    </div>
</main>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item"><img src="images/印提(微笑).png" alt="CG 1"></div>
        <div class="modal-item"><img src="images/大雨濕透.png" alt="CG 2"></div>
        <div class="modal-item"><img src="images/印提(寵溺微笑).png" alt="CG 3"></div>
        
        <p class="modal-footer-text">🌻 點擊背景或叉叉關閉</p>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("imageModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
