<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-text: #e3e3e3;
            --notion-border: #2f2f2f;
            --sidebar-bg: #121212;
            --accent-blue: #6fb2ff;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
        }

        /* --- 手機版頂部列 (僅手機顯示) --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--notion-border);
            z-index: 1000;
            padding: 0 15px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--notion-text);
            font-size: 24px;
            cursor: pointer;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-title a {
            text-decoration: none; 
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(227, 227, 227, 0.4);
            margin: 15px 0 5px 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-item {
            text-decoration: none; 
            color: var(--notion-text);
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
            cursor: pointer;
        }

        .nav-item:hover { background-color: #2c2c2c; }

        /* --- 主要內容區 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 0;
        }

        .novel-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2em;
            line-height: 2.2; /* 百萬字建議行高拉大，閱讀才舒服 */
            white-space: pre-line;
            color: var(--notion-text);
            letter-spacing: 0.03em;
        }

        h2 { 
            font-size: 1.8em; 
            margin-bottom: 20px;
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 15px;
        }

        /* --- IG風格 CG 網格 --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .modal-content {
            margin: 10% auto;
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .modal-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 4px;
            background: #222;
        }

        .modal-item img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .modal-footer-text {
            grid-column: span 3;
            color: #888;
            text-align: center;
            font-size: 13px;
            margin-top: 20px;
        }

        .close-btn {
            position: fixed;
            top: 15px; right: 25px;
            color: #fff; font-size: 35px; font-weight: bold;
            cursor: pointer; z-index: 10000;
        }

        /* --- 響應式修正 --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .mobile-header { display: flex; }

            .sidebar {
                position: fixed;
                left: 0; top: 50px; bottom: 0;
                z-index: 999;
                transform: translateX(-100%); /* 預設隱藏在左側 */
                box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            }

            /* 當選單開啟時的樣式 */
            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                padding: 70px 20px 20px 20px; /* 為頂部留空間 */
            }

            .modal-content {
                grid-template-columns: repeat(2, 1fr);
                margin: 25% auto;
            }
            .modal-footer-text { grid-column: span 2; }
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div style="font-weight: bold; font-size: 14px;">🌻 旅程分享</div>
    <div style="width: 24px;"></div> </header>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-title">
        <a href="index.html">🌻卿卿我我-旅程分享</a>
    </div>

    <div class="nav-group-label">CHAPTERS</div>
    <a href="chapter1.html" class="nav-item">📄 第 001 章：倒臥廢土</a>
    <a href="#" class="nav-item">📄 第 002 章：後續章節...</a>
    <a href="#" class="nav-item">📄 第 999 章：百萬字傳奇</a>

    <div class="nav-group-label">ALBUM</div>
    <a href="javascript:void(0)" class="nav-item" onclick="openModal(); closeSidebar();">📷 章節 CG 牆</a>
</nav>

<main class="main-content" onclick="closeSidebar()">
    <div class="content-container">
        <article id="ch1">
            <h2>1. 第一章：倒臥廢土</h2>
            <div class="novel-text">你醒來時，發現自己正倒臥在廢土上。
黏稠、帶有金屬味的泥土黏著你的臉頰。天色混濁，隱約能見奇特的飛行物……那群東西像是樹枝與鳥骨拼接而成的，甩著透明膜狀的翅，飛過你頭頂時還發出啪搭啪搭的聲音。</div>
        </article>
    </div>
</main>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item"><img src="images/印提(微笑).png" alt="CG 1"></div>
        <div class="modal-item"><img src="images/大雨濕透.png" alt="CG 2"></div>
        <div class="modal-item"><img src="images/印提(寵溺微笑).png" alt="CG 3"></div>
        <p class="modal-footer-text">點擊背景或叉叉關閉</p>
    </div>
</div>

<script>
    // 控制側邊欄開關
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
    }

    // 關閉側邊欄 (點擊內容區時自動關閉)
    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("active");
    }

    // Modal 控制
    function openModal() { document.getElementById("imageModal").style.display = "block"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        if (event.target == modal) { modal.style.display = "none"; }
    }
</script>

</body>
</html>
