        /* --- CG 網格牆 Modal (IG風格) --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
            padding-bottom: 50px;
        }

        /* --- 針對單張或少數 CG 的優化佈局 --- */
        .modal-content {
            margin: 5% auto; /* 減少上方留白，讓圖稍微往上一點 */
            width: 90%;
            max-width: 900px; /* 稍微放寬，讓單張大圖更有張力 */
            display: flex;    /* 改用 flex 讓單張圖居中 */
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .modal-item {
            width: auto;      /* 取消固定寬度 */
            max-width: 100%;  /* 確保不超出螢幕 */
            aspect-ratio: auto; /* 取消 1/1 強制正方形，還原圖片原比例 */
            overflow: visible;  /* 讓圖片完整顯示 */
            border-radius: 8px; /* 稍微加圓角 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 增加陰影感 */
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-item:hover {
            transform: scale(1.03); /* 滑鼠移上去稍微放大 */
        }

        .modal-item img {
            width: auto;
            max-height: 70vh; /* 限制高度，避免單張圖太長超出螢幕 */
            display: block;
            border-radius: 8px;
            object-fit: contain; /* 確保圖片不被裁切 */
        }

        /* 底部文字調整 */
        .modal-footer-text {
            width: 100%;
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .close-btn {
            position: fixed;
            top: 15px; right: 25px;
            color: #fff; font-size: 35px; font-weight: bold;
            cursor: pointer; z-index: 10000;
        }

        /* --- 大圖顯示視窗 (Lightbox) --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 20000; /* 確保在網格牆之上 */
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out; /* 點擊關閉 */
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            /* 預設隱藏，載入完成後由 JS 顯示 */
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active .lightbox-content {
            opacity: 1;
        }

        /* --- 響應式修正 --- */

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" class="lightbox-content" src="" alt="大圖檢視">
</div>

<script>
    // 側邊欄開關
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("active"); }

    // 網格牆 Modal 控制
    function openModal() { document.getElementById("imageModal").style.display = "block"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    // 💡 大圖視窗 (Lightbox) 控制
    function openLightbox(element) {
        // 1. 抓取被點擊容器內的圖片來源 (src)
        const imgSrc = element.querySelector('img').src;
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        // 2. 先將 lightbox 顯示出來，但內容透明 (CSS transition 會處理動畫)
        lightbox.style.display = "flex";
        
        // 3. 當大圖載入完成後，再賦予 active 樣式 (顯示出來)
        lightboxImg.onload = function() {
            lightbox.classList.add('active');
        };
        
        // 4. 設定大圖的來源
        lightboxImg.src = imgSrc;
    }

    function closeLightbox() {
        const lightbox = document.getElementById("lightbox");
        // 移除 active 樣式，大圖變透明
        lightbox.classList.remove('active');
        // 等待 CSS 動畫結束後再隱藏 lightbox，避免圖片殘影
        setTimeout(() => {
            lightbox.style.display = "none";
            // 清空 src，避免下次打開時先顯示舊圖
            document.getElementById("lightbox-img").src = "";
        }, 300);
    }

    // 點擊網格牆背景關閉 Modal
    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        if (event.target == modal) { modal.style.display = "none"; }
    }
</script>
