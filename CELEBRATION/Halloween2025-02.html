<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卿卿我我 | 旅程分享</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --notion-bg: #191919;
            --notion-text: #e3e3e3;
            --notion-border: #2f2f2f;
            --sidebar-bg: #121212;
            --accent-blue: #6fb2ff;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--notion-bg);
            color: var(--notion-text);
        }
        
	/* 背景描述：灰字、稍微縮點透明度 */
	.description {
	    color: #999999; 
 	   font-weight: 400;
	}

	/* 正常對話：白字、字體加重一點點 */
	.dialogue {
 	   color: #ffffff;
  	  font-weight: 400;
  	  padding-left: 10px;
	}

	/* 禁用狀態的樣式 */
	.nav-item.disabled, .extra-link-item.disabled {
	    color: #666 !important;
	    text-decoration: line-through;
	    pointer-events: none;
	    cursor: not-allowed;
	    opacity: 0.6;
	    border-left-color: #444 
	}

        /* --- 手機版頂部列 --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--notion-border);
            z-index: 1000;
            padding: 0 15px;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--notion-text);
            font-size: 24px;
            cursor: pointer;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--notion-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-title a {
            text-decoration: none;
            color: var(--notion-text);
            font-size: 1.2em;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        .nav-group-label {
            font-size: 11px;
            color: rgba(227, 227, 227, 0.4);
            margin: 15px 0 5px 5px;
            font-weight: bold;
        }

        .nav-item {
            text-decoration: none;
            color: var(--notion-text);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
            font-size: 14px;
            display: block;
        }

        .nav-item:hover { background-color: #2c2c2c; }
        /* --- 主要內容區 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 0;
        }

        /* --- 文字內容格式 --- */
        .novel-text {
            font-family: 'Songti TC', serif;
            font-size: 1.3em;
            line-height: 1.8;
            color: #999999;
            letter-spacing: 0.03em;
            text-align: left;
            max-width: 680px;
            margin: 0 auto;
            white-space: pre-line;
        }

        h2 { 
            font-size: 1.8em; 
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 15px;
            /* 統一對齊設定 */
            max-width: 680px; 
            margin: 0 auto 20px auto; 
            text-align: left; 
        }

        /* --- CG 網格牆 Modal (IG風格) --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .modal-content {
            margin: 10% auto;
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .modal-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 4px;
            background: #222;
            cursor: pointer; /* 滑鼠移上去變手指 */
            transition: transform 0.2s;
        }

        .modal-item:hover {
            transform: scale(1.03); /* 滑鼠移上去稍微放大 */
        }

        .modal-item img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .modal-footer-text {
            grid-column: span 3;
            color: #888;
            text-align: center;
            font-size: 13px;
            margin-top: 30px;
            font-family: sans-serif;
        }

        .close-btn {
            position: fixed;
            top: 15px; right: 25px;
            color: #fff; font-size: 35px; font-weight: bold;
            cursor: pointer; z-index: 10000;
        }

        /* --- 大圖顯示視窗 (Lightbox) --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 20000; /* 確保在網格牆之上 */
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out; /* 點擊關閉 */
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            /* 預設隱藏，載入完成後由 JS 顯示 */
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active .lightbox-content {
            opacity: 1;
        }

        /* --- 響應式修正 --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar {
                position: fixed;
                left: 0; top: 50px; bottom: 0;
                z-index: 999;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
            .main-content { padding: 70px 20px 20px 20px; }
            .modal-content { grid-template-columns: repeat(2, 1fr); margin: 25% auto; }
            .modal-footer-text { grid-column: span 2; }
        }
    </style>
</head>
<body>

<header class="mobile-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div style="font-weight: bold; font-size: 14px;">🌻 旅程分享</div>
    <div style="width: 24px;"></div>
</header>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-title">
        <a href="../index.html">🌻卿卿我我-旅程分享</a>
    </div>
    <div class="nav-group-label">ALBUM</div>
    <a href="javascript:void(0)" class="nav-item" onclick="openModal(); closeSidebar();">📷 章節CG</a>
    <div class="nav-group-label">EXTRAS</div>
    <a href="../CELEBRATION.html" class="nav-item">🎈 節慶區</a>
    <a href="../SPELL.html" class="nav-item">🔮 咒語區</a>
    <div class="nav-group-label">CELEBRATION</div>
    <a href="Halloween2025-01.html" class="nav-item">🍬 萬聖節-小小印提！？</a>
    <a href="Halloween2025-02.html" class="nav-item">🎃 萬聖節-裝扮構想</a>
</div>
</nav>

<main class="main-content" onclick="closeSidebar()">
    <div class="content-container">
        <article id="ch1">

           <h2>第？章：萬聖節-裝扮構想</h2>
            <div class="novel-text">
測試：123456
	</div>

        </article>
    </div>
</main>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-item" onclick="openLightbox(this)"><img src="../images/SideCG/2025萬聖節變裝.png" alt="CG 1" loading="lazy"></div>
        
        <p class="modal-footer-text">🌻點擊圖片檢視大圖 | 點擊背景關閉網格牆</p>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" class="lightbox-content" src="" alt="大圖檢視">
</div>

<script>
    // 側邊欄開關
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("active"); }

    // 網格牆 Modal 控制
    function openModal() { document.getElementById("imageModal").style.display = "block"; }
    function closeModal() { document.getElementById("imageModal").style.display = "none"; }

    // 💡 大圖視窗 (Lightbox) 控制
    function openLightbox(element) {
        // 1. 抓取被點擊容器內的圖片來源 (src)
        const imgSrc = element.querySelector('img').src;
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        // 2. 先將 lightbox 顯示出來，但內容透明 (CSS transition 會處理動畫)
        lightbox.style.display = "flex";
        
        // 3. 當大圖載入完成後，再賦予 active 樣式 (顯示出來)
        lightboxImg.onload = function() {
            lightbox.classList.add('active');
        };
        
        // 4. 設定大圖的來源
        lightboxImg.src = imgSrc;
    }

    function closeLightbox() {
        const lightbox = document.getElementById("lightbox");
        // 移除 active 樣式，大圖變透明
        lightbox.classList.remove('active');
        // 等待 CSS 動畫結束後再隱藏 lightbox，避免圖片殘影
        setTimeout(() => {
            lightbox.style.display = "none";
            // 清空 src，避免下次打開時先顯示舊圖
            document.getElementById("lightbox-img").src = "";
        }, 300);
    }

    // 點擊網格牆背景關閉 Modal
    window.onclick = function(event) {
        let modal = document.getElementById("imageModal");
        if (event.target == modal) { modal.style.display = "none"; }
    }
</script>

</body>
</html>
